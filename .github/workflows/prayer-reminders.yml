name: Prayer reminders

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Nooriva prayer reminders
        env:
          REMINDER_URL: ${{ secrets.NOORIVA_PRAYER_REMINDER_URL }}
          CRON_SECRET: ${{ secrets.NOORIVA_CRON_SECRET }}
        run: |
          if [ -z "$REMINDER_URL" ]; then
            echo "NOORIVA_PRAYER_REMINDER_URL is missing"
            exit 1
          fi

          curl --fail-with-body \
            -X POST \
            -H "x-cron-secret: $CRON_SECRET" \
            "$REMINDER_URL?window=5"
