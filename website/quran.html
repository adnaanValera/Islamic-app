<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nooriva | Quran</title>
    <meta
      name="description"
      content="Read the Quran in Arabic, English, or both with a simple Nooriva web reader."
    />
    <meta name="theme-color" content="#f8f3ea" />
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell page-shell-prayer">
      <header class="site-header prayer-mobile-header">
        <div class="brand-lockup">
          <a href="./index.html" aria-label="Back to Nooriva home">
            <img class="brand-logo" src="./assets/nooriva-logo-transparent.png" alt="Nooriva logo" />
          </a>
        </div>
        <nav class="site-nav">
          <a href="./index.html">Home</a>
          <a href="./prayer.html">Prayer</a>
          <a href="./qibla.html">Qibla</a>
          <a href="./quran.html" aria-current="page">Quran</a>
          <a href="./tasbeeh.html">Tasbeeh</a>
          <a href="./account.html">Account</a>
          <a href="./settings.html">Help</a>
        </nav>
      </header>

      <main class="prayer-page">
        <section class="prayer-table-card prayer-table-card-hero quran-reader-shell quran-reader-shell-premium">
          <div class="quran-reader-toolbar">
            <div class="quran-reader-toolbar-top">
              <div class="quran-language-toggle" id="quran-language-toggle">
                <button class="quran-language-button is-active" data-quran-view="both" type="button">Both</button>
                <button class="quran-language-button" data-quran-view="arabic" type="button">Arabic</button>
                <button class="quran-language-button" data-quran-view="english" type="button">English</button>
              </div>

              <div class="quran-reader-nav">
                <button class="quran-nav-button" id="quran-prev-surah" type="button">Previous surah</button>
                <button class="quran-nav-button" id="quran-next-surah" type="button">Next surah</button>
              </div>
            </div>

            <div class="quran-reader-toolbar-bottom">
              <div class="quran-toolbar-search">
                <input
                  class="quran-search-input"
                  id="quran-search"
                  type="search"
                  placeholder="Search surah name or number"
                  autocomplete="off"
                />
              </div>

              <details class="quran-surah-dropdown" id="quran-surah-dropdown">
                <summary>
                  <span>Surah</span>
                  <strong id="quran-current-surah">Jump to surah</strong>
                </summary>
                <div class="quran-surah-dropdown-list" id="quran-surah-grid"></div>
              </details>
            </div>
          </div>

          <div class="quran-reader-header quran-reader-header-premium quran-reader-header-minimal">
            <div class="status-stack">
              <p class="status-line" id="quran-status">Loading Quran...</p>
            </div>
          </div>

          <div class="quran-basmala-card" id="quran-basmala-card">
            <p class="quran-basmala-label">Bismillah</p>
            <p class="quran-basmala-text" id="quran-basmala-text" dir="rtl" lang="ar"></p>
          </div>

          <div class="quran-reading-stage">
            <div class="quran-ayah-list" id="quran-ayah-list">
              <article class="quran-ayah-card">
                <div class="quran-ayah-topline">
                  <span>Loading</span>
                </div>
                <p class="quran-ayah-translation">Please wait.</p>
              </article>
            </div>

            <div class="quran-page-indicators" id="quran-page-indicators" aria-label="Quran page navigation"></div>
          </div>
        </section>

        <nav class="mobile-bottom-nav home-mobile-bottom-nav" aria-label="Mobile navigation">
          <a href="./index.html">Home</a>
          <a href="./prayer.html">Prayer</a>
          <a href="./qibla.html">Qibla</a>
          <a href="./quran.html" aria-current="page">Quran</a>
          <a href="./tasbeeh.html">Tasbeeh</a>
          <a href="./account.html">Account</a>
          <a href="./settings.html">Help</a>
        </nav>
      </main>
    </div>

    <script src="./install-app.js"></script>
    <script src="./mobile-nav.js"></script>
    <script src="./quran.js"></script>
  </body>
</html>
