<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nooriva | Tasbeeh</title>
    <meta
      name="description"
      content="A simple tasbeeh counter in Nooriva with saved progress and daily dhikr modes."
    />
    <meta name="theme-color" content="#f8f3ea" />
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell page-shell-prayer">
      <header class="site-header prayer-mobile-header">
        <div class="brand-lockup">
          <a href="./index.html" aria-label="Back to Nooriva home">
            <img
              class="brand-logo"
              src="./assets/nooriva-logo-transparent.png"
              alt="Nooriva logo"
            />
          </a>
        </div>
        <nav class="site-nav">
          <a href="./index.html">Home</a>
          <a href="./prayer.html">Prayer</a>
          <a href="./qibla.html">Qibla</a>
          <a href="./quran.html">Quran</a>
          <a href="./tasbeeh.html" aria-current="page">Tasbeeh</a>
          <a href="./account.html">Account</a>
          <a href="./settings.html">Help</a>
        </nav>
      </header>

      <main class="prayer-page">
        <section class="prayer-hero prayer-hero-tasbeeh-simple">
          <div class="prayer-table-card prayer-table-card-hero tasbeeh-hero-card tasbeeh-hero-card-simple">
            <div class="tasbeeh-counter-shell">
              <button class="tasbeeh-counter-button" id="tasbeeh-tap" type="button" aria-label="Increase tasbeeh count">
                <span class="tasbeeh-counter-ring"></span>
                <strong class="tasbeeh-counter-value" id="tasbeeh-count">0</strong>
                <span class="tasbeeh-counter-hint">Tap to count</span>
              </button>
              <div class="tasbeeh-active-dhikr tasbeeh-active-dhikr-centered">
                <strong id="active-dhikr-label">SubhanAllah</strong>
                <span id="active-dhikr-arabic">SubhanAllah</span>
              </div>
              <div class="next-prayer-progress tasbeeh-progress" aria-hidden="true">
                <span class="next-prayer-progress-fill" id="tasbeeh-progress-fill"></span>
              </div>
              <p class="qibla-angle" id="tasbeeh-progress-copy">0 of 33</p>
              <p class="qibla-simple-status" id="tasbeeh-status">Saved on this device.</p>
              <p class="tasbeeh-goal-copy-simple" id="tasbeeh-goal-copy">33 remaining in this round.</p>
            </div>
          </div>

          <div class="prayer-hero-copy prayer-hero-copy-compact">
            <p class="eyebrow">Tasbeeh</p>
            <h1 class="prayer-hero-title">Keep dhikr simple.</h1>
            <div class="tasbeeh-targets tasbeeh-targets-simple">
              <button class="tasbeeh-chip is-active" data-dhikr="subhanallah" type="button">SubhanAllah</button>
              <button class="tasbeeh-chip" data-dhikr="alhamdulillah" type="button">Alhamdulillah</button>
              <button class="tasbeeh-chip" data-dhikr="allahuakbar" type="button">Allahu Akbar</button>
              <button class="tasbeeh-chip" data-dhikr="custom" type="button">General</button>
            </div>
            <div class="tasbeeh-targets tasbeeh-targets-simple">
              <button class="tasbeeh-chip is-active" data-target="33" type="button">33</button>
              <button class="tasbeeh-chip" data-target="99" type="button">99</button>
              <button class="tasbeeh-chip" data-target="100" type="button">100</button>
            </div>
            <div class="prayer-section-meta tasbeeh-meta-simple">
              <div class="prayer-meta-pill">
                <span>Today</span>
                <strong id="tasbeeh-today-total">0</strong>
              </div>
              <div class="prayer-meta-pill">
                <span>Round</span>
                <strong id="tasbeeh-round-total">0</strong>
              </div>
              <div class="prayer-meta-pill">
                <span>Target</span>
                <strong id="tasbeeh-target-total">33</strong>
              </div>
            </div>
          </div>
        </section>

        <div class="tasbeeh-hidden-data" aria-hidden="true">
          <span id="tasbeeh-last-reset"></span>
          <span id="tasbeeh-target-badge"></span>
          <span id="tasbeeh-streak"></span>
          <span id="tasbeeh-best-dhikr"></span>
          <span id="tasbeeh-completed-rounds"></span>
          <div id="tasbeeh-history-list"></div>
          <button id="tasbeeh-add" type="button"></button>
          <button id="tasbeeh-reset" type="button"></button>
          <button id="tasbeeh-minus" type="button"></button>
          <button id="tasbeeh-complete-round" type="button"></button>
        </div>

        <nav class="mobile-bottom-nav home-mobile-bottom-nav" aria-label="Mobile navigation">
          <a href="./index.html">Home</a>
          <a href="./prayer.html">Prayer</a>
          <a href="./qibla.html">Qibla</a>
          <a href="./quran.html">Quran</a>
          <a href="./tasbeeh.html" aria-current="page">Tasbeeh</a>
          <a href="./account.html">Account</a>
          <a href="./settings.html">Help</a>
        </nav>
      </main>
    </div>

    <script src="./install-app.js"></script>
    <script src="./mobile-nav.js"></script>
    <script src="./tasbeeh.js"></script>
  </body>
</html>
