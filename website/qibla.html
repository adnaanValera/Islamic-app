<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nooriva | Qibla</title>
    <meta
      name="description"
      content="Find the Qibla direction with Nooriva using your location and device compass."
    />
    <meta name="theme-color" content="#f8f3ea" />
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell page-shell-prayer">
      <header class="site-header prayer-mobile-header">
        <div class="brand-lockup">
          <a href="./index.html" aria-label="Back to Nooriva home">
            <img
              class="brand-logo"
              src="./assets/nooriva-logo-transparent.png"
              alt="Nooriva logo"
            />
          </a>
        </div>
        <nav class="site-nav">
          <a href="./index.html">Home</a>
          <a href="./prayer.html">Prayer</a>
          <a href="./qibla.html" aria-current="page">Qibla</a>
          <a href="./quran.html">Quran</a>
          <a href="./tasbeeh.html">Tasbeeh</a>
          <a href="./account.html">Account</a>
          <a href="./settings.html">Help</a>
        </nav>
      </header>

      <main class="prayer-page qibla-page-simple">
        <section class="prayer-table-card prayer-table-card-hero qibla-hero-card qibla-hero-card-simple">
          <button class="qibla-auto-enable" id="enable-qibla" type="button" aria-label="Enable Qibla compass"></button>
          <div class="qibla-compass-shell qibla-premium-shell">
            <div class="qibla-compass-frame">
              <div class="qibla-compass-glow"></div>
              <div class="qibla-compass">
                <div class="qibla-ring"></div>
                <div class="qibla-north-mark">N</div>
                <div class="qibla-direction-arrow" id="qibla-direction-arrow"></div>
                <div class="qibla-phone-arrow" id="qibla-phone-arrow"></div>
                <div class="qibla-center-dot"></div>
              </div>
            </div>
            <p class="qibla-angle" id="qibla-angle">Preparing compass...</p>
            <p class="qibla-simple-status" id="qibla-status">Allow location and motion access to begin.</p>
          </div>
          <div class="qibla-hidden-data" aria-hidden="true">
            <span id="device-heading"></span>
            <span id="qibla-bearing"></span>
            <span id="qibla-alignment"></span>
            <span id="qibla-accuracy"></span>
            <span id="qibla-mode"></span>
            <span id="qibla-fallback"></span>
            <span id="qibla-guidance-title"></span>
            <span id="qibla-guidance-detail"></span>
            <span id="qibla-guidance-text"></span>
          </div>
        </section>

        <nav class="mobile-bottom-nav home-mobile-bottom-nav" aria-label="Mobile navigation">
          <a href="./index.html">Home</a>
          <a href="./prayer.html">Prayer</a>
          <a href="./qibla.html" aria-current="page">Qibla</a>
          <a href="./quran.html">Quran</a>
          <a href="./tasbeeh.html">Tasbeeh</a>
          <a href="./account.html">Account</a>
          <a href="./settings.html">Help</a>
        </nav>
      </main>
    </div>

    <script src="./install-app.js"></script>
    <script src="./mobile-nav.js"></script>
    <script src="./qibla.js"></script>
  </body>
</html>
