<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nooriva | Account</title>
    <meta
      name="description"
      content="Create or sign in to your Nooriva account with your full name and password."
    />
    <meta name="theme-color" content="#f8f3ea" />
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell page-shell-prayer">
      <header class="site-header prayer-mobile-header">
        <div class="brand-lockup">
          <a href="./index.html" aria-label="Back to Nooriva home">
            <img class="brand-logo" src="./assets/nooriva-logo-transparent.png" alt="Nooriva logo" />
          </a>
        </div>
        <nav class="site-nav">
          <a href="./index.html">Home</a>
          <a href="./prayer.html">Prayer</a>
          <a href="./qibla.html">Qibla</a>
          <a href="./quran.html">Quran</a>
          <a href="./tasbeeh.html">Tasbeeh</a>
          <a href="./account.html" aria-current="page">Account</a>
          <a href="./settings.html">Help</a>
        </nav>
      </header>

      <main class="prayer-page">
        <section class="account-page-simple">
          <div class="prayer-table-card prayer-table-card-hero quran-hero-card account-hero-card account-hero-card-simple">
            <div class="quran-hero-shell">
              <p class="status-line" id="account-status">No account session yet.</p>
              <div class="account-signed-in-card is-hidden" id="account-signed-in-card">
                <strong id="account-signed-in-name">Nooriva user</strong>
              </div>

              <div class="account-switch" id="account-switch">
                <button class="account-switch-button is-active" id="account-show-signin" type="button">Log in</button>
                <button class="account-switch-button" id="account-show-register" type="button">Sign up</button>
              </div>

              <div class="account-form-stack" id="account-form-stack">
                <div class="account-form-card" id="account-signin-card">
                  <div class="account-fields">
                    <input id="signin-full-name" class="quran-search-input" type="text" placeholder="Full name" autocomplete="name" />
                    <input id="signin-password" class="quran-search-input" type="password" placeholder="Password" autocomplete="current-password" />
                    <button class="button button-primary" id="account-signin" type="button">Log in</button>
                  </div>
                </div>
                <div class="account-form-card is-hidden" id="account-register-card">
                  <div class="account-fields">
                    <input id="register-full-name" class="quran-search-input" type="text" placeholder="Full name" autocomplete="name" />
                    <input id="register-password" class="quran-search-input" type="password" placeholder="Password" autocomplete="new-password" />
                    <button class="button button-secondary" id="account-register" type="button">Sign up</button>
                  </div>
                </div>
              </div>

              <div class="tasbeeh-actions-grid">
                <button class="button button-secondary" id="account-signout" type="button">Sign out</button>
              </div>

              <div class="admin-panel is-hidden" id="admin-panel">
                <div class="section-heading">
                  <div>
                    <p class="eyebrow">Admin</p>
                    <h2>Dashboard</h2>
                  </div>
                </div>
                <div class="feature-grid settings-grid">
                  <details class="feature-card feature-card-rich admin-dropdown" open>
                    <summary class="admin-dropdown-summary">
                      <div>
                        <p>01</p>
                        <h3>Users</h3>
                      </div>
                    </summary>
                    <div class="timings-list" id="admin-users-list"></div>
                  </details>
                  <details class="feature-card feature-card-rich admin-dropdown">
                    <summary class="admin-dropdown-summary">
                      <div>
                        <p>02</p>
                        <h3>Messages</h3>
                      </div>
                    </summary>
                    <div class="timings-list" id="admin-messages-list"></div>
                  </details>
                </div>
              </div>
            </div>
          </div>
        </section>

        <nav class="mobile-bottom-nav home-mobile-bottom-nav" aria-label="Mobile navigation">
          <a href="./index.html">Home</a>
          <a href="./prayer.html">Prayer</a>
          <a href="./qibla.html">Qibla</a>
          <a href="./quran.html">Quran</a>
          <a href="./tasbeeh.html">Tasbeeh</a>
          <a href="./account.html" aria-current="page">Account</a>
          <a href="./settings.html">Help</a>
        </nav>
      </main>
    </div>

    <script src="./install-app.js"></script>
    <script src="./mobile-nav.js"></script>
    <script src="./account.js"></script>
  </body>
</html>
